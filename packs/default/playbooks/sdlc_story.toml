[playbook]
id = "sdlc_story"
description = "Story: requirement -> plan -> sliced implementation -> review -> integrate"

[[step]]
id = "requirement"
role = "product_owner"
produces = "requirement_artifact"
gate = "human"

[[step]]
id = "architecture"
role = "architect"
needs = ["requirement"]
produces = "architecture_artifact"
gate = "human"

[[step]]
id = "test_plan"
role = "qa"
needs = ["requirement"]
produces = "test_plan_artifact"
gate = "human"

[[step]]
id = "plan_approval"
role = "system"
type = "derived_gate"
needs = ["requirement", "architecture", "test_plan"]

[[step]]
id = "implement"
role = "developer"
needs = ["plan_approval"]
fan_out = "architecture_artifact.slices"
produces = "code_diff_artifact"
gate = "none"
writes = true

[[step]]
id = "review"
role = "reviewer"
needs = ["implement"]
fan_out_from = "implement"
produces = "review_artifact"
gate = "agent"
loop = { back_to = "implement", max_rounds = 5 }

[[step]]
id = "integrate"
role = "integrator"
needs = ["review"]
produces = "integration_artifact"
gate = "human"
escalates_on = "escalated"
